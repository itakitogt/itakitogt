<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itakito_GT | Profile</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #5865F2;
            --admin: #ff4757;
        }

        body {
            background: url('https://www.10wallpaper.com/wallpaper/1366x768/1508/sardinia_italy-Landscape_wallpaper_1366x768.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- NAVBAR FUNCIONAL --- */
        .navbar {
            width: 100%;
            height: 55px;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 3000;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent);
        }

        .nav-links div {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin-right: 25px;
            cursor: pointer;
            font-weight: bold;
            opacity: 0.8;
            transition: 0.3s;
        }

        .nav-links div:hover { opacity: 1; color: var(--accent); }

        .main-container { 
            margin-top: 70px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            height: calc(100vh - 80px); 
            overflow-y: auto; 
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 700px;
            margin-bottom: 30px;
            display: none; /* Se controla por JS */
            animation: fadeIn 0.4s ease;
        }

        /* --- AUTH --- */
        .auth-box { padding: 40px; text-align: center; display: block; }
        .auth-box input {
            width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white;
        }

        .badge { background: var(--admin); padding: 3px 8px; border-radius: 5px; font-size: 11px; vertical-align: middle; }
        
        .banner { width: 100%; height: 140px; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
        .profile-header { text-align: center; margin-top: -60px; padding-bottom: 20px; }
        .pfp { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #1e1e2e; }

        .feed-item { padding: 15px; border-bottom: 1px solid var(--border); }
        .feed-item img { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; }

        .btn-blue { 
            background: var(--accent); color: white; border: none; padding: 12px 25px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-blue:hover { transform: scale(1.05); background: #4752c4; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkLogin()">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar" id="nav-bar" style="display:none;">
        <div class="nav-links">
            <div onclick="showTab('home')">INICIO</div>
            <div onclick="showTab('destacados')">DESTACADOS</div>
            <div onclick="showTab('juegos')">JUEGOS</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="showTab('config')">
            <span id="user-name-nav" style="font-size:14px;"></span>
            <img id="user-pfp-nav" src="" style="width:35px; height:35px; border-radius:50%; border:1px solid white;">
        </div>
    </nav>

    <div class="main-container">
        
        <!-- PANTALLA DE LOGIN -->
        <div id="tab-login" class="glass-card auth-box">
            <h2>Comunidad Itakito_GT</h2>
            <p>Ingresa para interactuar</p>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <br><br>
            <button class="btn-blue" onclick="login()">ENTRAR / REGISTRARSE</button>
        </div>

        <!-- SECCIÓN INICIO -->
        <div id="tab-home" class="glass-card">
            <div class="banner"></div>
            <div class="profile-header">
                <img src="https://yt3.googleusercontent.com/n2_9nfR7jLbPwRnJkQJ2oyMMQpS-r1wgRpftNcsKJgNT_RvEHkw5HYDgJV1Ke-P19-u6WnCkqn0=s160-c-k-c0x00ffffff-no-rj" class="pfp">
                <h1>Itakito_GT <span class="badge">OWNER</span></h1>
                <p>Especialista en ItaOS Lite y Minecraft Dev</p>
            </div>
        </div>

        <!-- SECCIÓN DESTACADOS -->
        <div id="tab-destacados" class="glass-card" style="padding: 20px;">
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <textarea id="post-input" placeholder="¿Qué cuentas, we? (Usa <b>, <i> o <img>)" style="width:100%; height:70px; background:none; border:none; color:white; outline:none; resize:none;"></textarea>
                <button class="btn-blue" style="float:right; padding: 6px 15px;" onclick="publish()">PUBLICAR</button>
                <div style="clear:both;"></div>
            </div>
            <div id="muro-posts">
                <!-- Posts aquí -->
            </div>
        </div>

        <!-- SECCIÓN CONFIG -->
        <div id="tab-config" class="glass-card" style="padding: 40px; text-align: center;">
            <img id="conf-pfp" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent);">
            <h2 id="conf-name"></h2>
            <button class="btn-blue" style="background:#ff4757;" onclick="logout()">CERRAR SESIÓN</button>
        </div>

    </div>

    <script>
        let user = null;
        const ADMIN_MAIL = "jugandoconitakito@gmail.com";

        function showTab(id) {
            // Ocultar todas las pestañas
            const tabs = ['login', 'home', 'destacados', 'config'];
            tabs.forEach(t => document.getElementById('tab-' + t).style.display = 'none');
            
            // Mostrar la seleccionada
            document.getElementById('tab-' + id).style.display = 'block';
        }

        function checkLogin() {
            const data = localStorage.getItem('session');
            if (data) {
                user = JSON.parse(data);
                loadUI();
                showTab('home');
            } else {
                showTab('login');
            }
        }

        function login() {
            const mail = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            if (!mail || !password) return alert("Pon tus datos, we.");

            // Sistema de Admin vs Usuario
            if (mail.toLowerCase() === ADMIN_MAIL) {
                user = {
                    name: "ItakitoYTblox",
                    pfp: "https://yt3.googleusercontent.com/n2_9nfR7jLbPwRnJkQJ2oyMMQpS-r1wgRpftNcsKJgNT_RvEHkw5HYDgJV1Ke-P19-u6WnCkqn0=s160-c-k-c0x00ffffff-no-rj",
                    isAdmin: true
                };
            } else {
                // Simulación de registro: si el correo es de admin pero la contraseña no es del dueño (ejemplo), bloquear
                user = {
                    name: mail.split('@')[0],
                    pfp: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    isAdmin: false
                };
            }

            localStorage.setItem('session', JSON.stringify(user));
            loadUI();
            showTab('home');
        }

        function loadUI() {
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('user-name-nav').innerHTML = user.name + (user.isAdmin ? ' <span class="badge">ADMIN</span>' : '');
            document.getElementById('user-pfp-nav').src = user.pfp;
            document.getElementById('conf-pfp').src = user.pfp;
            document.getElementById('conf-name').innerText = user.name;
        }

        function publish() {
            const text = document.getElementById('post-input').value;
            if (!text) return;

            const postHTML = `
                <div class="feed-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${user.pfp}" style="width:30px; height:30px; border-radius:50%;">
                        <strong>${user.name}</strong> ${user.isAdmin ? '<span class="badge">ADMIN</span>' : ''}
                    </div>
                    <div style="margin-top:10px; font-size:15px; line-height:1.4;">${text}</div>
                </div>
            `;
            
            document.getElementById('muro-posts').innerHTML = postHTML + document.getElementById('muro-posts').innerHTML;
            document.getElementById('post-input').value = "";
        }

        function logout() {
            localStorage.removeItem('session');
            location.reload();
        }
    </script>
</body>
</html>
