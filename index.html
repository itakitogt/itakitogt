<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itakito_GT | Community</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --mac-bg: #1e1e1e;
            --mac-header: #323232;
            --accent: #5865F2;
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: url('https://www.10wallpaper.com/wallpaper/1366x768/1508/sardinia_italy-Landscape_wallpaper_1366x768.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- NAVBAR --- */
        .navbar {
            width: 100%; height: 50px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; position: fixed; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--accent); box-sizing: border-box;
        }

        .nav-links div { cursor: pointer; font-weight: bold; font-size: 13px; opacity: 0.8; transition: 0.3s; margin-right: 20px; display: inline-block; }
        .nav-links div:hover { opacity: 1; color: var(--accent); }

        /* --- VENTANA ESTILO MAC --- */
        .mac-window {
            background: var(--mac-bg);
            width: 90%; max-width: 800px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-top: 80px;
            border: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .mac-header {
            background: var(--mac-header);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        .mac-content { padding: 20px; max-height: 70vh; overflow-y: auto; }

        /* --- EDITOR DE POSTS --- */
        .post-box { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .toolbar button { background: #444; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .toolbar button:hover { background: var(--accent); }
        textarea { width: 100%; background: transparent; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; resize: none; box-sizing: border-box; }

        /* --- POSTS --- */
        .post { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-pfp { width: 35px; height: 35px; border-radius: 50%; }
        .post-body { font-size: 14px; margin-bottom: 10px; }
        .post-footer { display: flex; gap: 15px; font-size: 12px; color: #aaa; cursor: pointer; }
        .badge { background: #ff4757; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

        /* --- COMENTARIOS --- */
        .comment-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; display: none; }
        .comment { font-size: 13px; background: #1a1a1a; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
        .reply-input { display: flex; gap: 5px; margin-top: 10px; }
        .reply-input input { flex: 1; background: #333; border: none; color: white; padding: 5px; border-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkLogin()">

    <nav class="navbar" id="nav-bar" style="display:none;">
        <div class="nav-links">
            <div onclick="showTab('home')"> INICIO</div>
            <div onclick="showTab('destacados')">FEED</div>
            <div onclick="showTab('config')">PERFIL</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="user-nav-name" style="font-size:12px;"></span>
            <img id="user-nav-pfp" src="" style="width:30px; height:30px; border-radius:50%;">
        </div>
    </nav>

    <div id="main-window" class="mac-window">
        <div class="mac-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span style="margin-left: 10px; font-size: 12px; opacity: 0.5;">Itakito_OS Terminal</span>
        </div>
        
        <div class="mac-content">
            <div id="tab-home" style="display:none; text-align: center;">
                <img src="https://yt3.googleusercontent.com/n2_9nfR7jLbPwRnJkQJ2oyMMQpS-r1wgRpftNcsKJgNT_RvEHkw5HYDgJV1Ke-P19-u6WnCkqn0=s160-c-k-c0x00ffffff-no-rj" style="width:100px; border-radius:50%; border:3px solid var(--accent);">
                <h1>Bienvenido a la Terminal</h1>
                <p>Aquí puedes ver los últimos posts y novedades del servidor.</p>
                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                <div id="home-feed">
                    </div>
            </div>

            <div id="tab-destacados" style="display:none;">
                <div class="post-box">
                    <div class="toolbar">
                        <button onclick="addTag('b')"><b>B</b></button>
                        <button onclick="addTag('i')"><i>I</i></button>
                        <button onclick="alert('Arrastra o pega la URL de la imagen en el texto, we.')">🖼️ Imagen</button>
                    </div>
                    <textarea id="post-text" placeholder="¿Qué estás desarrollando hoy, we?"></textarea>
                    <button onclick="createPost()" style="margin-top:10px; background:var(--accent); border:none; color:white; padding:8px 20px; border-radius:5px; cursor:pointer; width:100%;">PUBLICAR EN EL MURO</button>
                </div>
                <div id="global-feed"></div>
            </div>

            <div id="tab-config" style="display:none; text-align: center;">
                <h2 id="profile-name"></h2>
                <button onclick="logout()" style="background:#ff4757; border:none; color:white; padding:10px 20px; border-radius:5px; cursor:pointer;">CERRAR SESIÓN</button>
            </div>
        </div>
    </div>

    <div id="tab-login" style="margin-top:100px; text-align:center; background:rgba(0,0,0,0.8); padding:30px; border-radius:15px; border:1px solid var(--accent);">
        <h2>Inicia Sesión</h2>
        <input type="text" id="login-mail" placeholder="Email" style="display:block; width:200px; margin:10px auto; padding:8px;"><br>
        <button onclick="login()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">ENTRAR</button>
    </div>

    <script>
        let currentUser = null;

        function showTab(tabId) {
            ['home', 'destacados', 'config'].forEach(id => {
                document.getElementById('tab-' + id).style.display = 'none';
            });
            document.getElementById('tab-' + tabId).style.display = 'block';
        }

        function checkLogin() {
            const session = localStorage.getItem('itakito_session');
            if(session) {
                currentUser = JSON.parse(session);
                initUI();
            }
        }

        function login() {
            const mail = document.getElementById('login-mail').value;
            if(!mail) return alert("Pon tu mail, we.");
            
            currentUser = {
                name: mail.split('@')[0],
                pfp: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                isAdmin: mail === "jugandoconitakito@gmail.com"
            };
            
            localStorage.setItem('itakito_session', JSON.stringify(currentUser));
            initUI();
        }

        function initUI() {
            document.getElementById('tab-login').style.display = 'none';
            document.getElementById('main-window').style.display = 'block';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('user-nav-name').innerText = currentUser.name;
            document.getElementById('user-nav-pfp').src = currentUser.pfp;
            document.getElementById('profile-name').innerText = currentUser.name;
            showTab('home');
        }

        function addTag(tag) {
            const area = document.getElementById('post-text');
            area.value += `<${tag}></${tag}>`;
            area.focus();
        }

        function createPost() {
            const text = document.getElementById('post-text').value;
            if(!text) return;

            const postId = Date.now();
            const postHTML = `
                <div class="post" id="post-${postId}">
                    <div class="post-header">
                        <img src="${currentUser.pfp}" class="post-pfp">
                        <strong>${currentUser.name}</strong> ${currentUser.isAdmin ? '<span class="badge">OWNER</span>' : ''}
                    </div>
                    <div class="post-body">${text}</div>
                    <div class="post-footer">
                        <span onclick="toggleComments(${postId})">💬 <span id="count-${postId}">0</span> Comentarios</span>
                        <span>🚀 Compartir</span>
                    </div>
                    <div class="comment-section" id="comments-${postId}">
                        <div id="list-${postId}"></div>
                        <div class="reply-input">
                            <input type="text" id="input-${postId}" placeholder="Escribe un comentario...">
                            <button onclick="addComment(${postId})" style="background:var(--accent); border:none; color:white; border-radius:4px; padding:0 10px; cursor:pointer;">➔</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('global-feed').innerHTML = postHTML + document.getElementById('global-feed').innerHTML;
            document.getElementById('home-feed').innerHTML = postHTML + document.getElementById('home-feed').innerHTML;
            document.getElementById('post-text').value = "";
        }

        function toggleComments(id) {
            const section = document.getElementById('comments-' + id);
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        function addComment(id) {
            const input = document.getElementById('input-' + id);
            const list = document.getElementById('list-' + id);
            const countLabel = document.getElementById('count-' + id);
            
            if(!input.value) return;

            const newComment = document.createElement('div');
            newComment.className = 'comment';
            newComment.innerHTML = `<strong>${currentUser.name}:</strong> ${input.value}`;
            list.appendChild(newComment);

            countLabel.innerText = parseInt(countLabel.innerText) + 1;
            input.value = "";
        }

        function logout() {
            localStorage.removeItem('itakito_session');
            location.reload();
        }
    </script>
</body>
</html>
