<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itakito_GT | Profile</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #5865F2;
            --admin: #ff4757;
        }

        body {
            background: url('https://www.10wallpaper.com/wallpaper/1366x768/1508/sardinia_italy-Landscape_wallpaper_1366x768.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'SF Pro Display', sans-serif;
            overflow: hidden;
            color: white;
        }

        .navbar {
            width: 100%;
            height: 50px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 3000;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links a { color: white; text-decoration: none; font-size: 14px; margin-right: 20px; cursor: pointer; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }

        .main-container { margin-top: 60px; width: 100%; display: flex; justify-content: center; height: calc(100vh - 70px); overflow-y: auto; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        /* --- LOGIN FORM --- */
        .auth-form { padding: 40px; text-align: center; }
        .auth-form input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: white;
        }

        /* --- UI ELEMENTS --- */
        .badge { background: var(--admin); padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
        .banner { width: 100%; height: 120px; background: linear-gradient(90deg, #1e1e2e, #5865F2); }
        .profile-pic-container { margin-top: -50px; text-align: center; }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #1e1e2e; background: white; }

        .feed-item img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="initApp()">

    <nav class="navbar">
        <div class="nav-links">
            <a onclick="showSection('home')">Inicio</a>
            <a onclick="showSection('juegos')">Juegos</a>
            <a onclick="showSection('destacados')">Destacados</a>
        </div>
        <div id="user-profile" style="display:none; align-items:center; gap:10px; cursor:pointer;" onclick="showSection('settings')">
            <span id="nav-name" style="font-weight:bold;"></span>
            <img id="nav-avatar" src="" style="width:30px; height:30px; border-radius:50%; border:1px solid white;">
        </div>
    </nav>

    <div class="main-container">
        
        <!-- LOGIN / REGISTRO -->
        <div id="section-auth" class="glass-card auth-form">
            <h2>Acceso a la Comunidad</h2>
            <input type="email" id="auth-email" placeholder="Correo electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <button class="btn-action" onclick="handleAuth()">Entrar / Registrarse</button>
            <p style="font-size: 12px; opacity: 0.6; margin-top: 15px;">Usa tu correo para guardar tu progreso, we.</p>
        </div>

        <!-- INICIO -->
        <div id="section-home" class="glass-card" style="display:none;">
            <div class="banner"></div>
            <div class="profile-pic-container">
                <img src="https://yt3.googleusercontent.com/n2_9nfR7jLbPwRnJkQJ2oyMMQpS-r1wgRpftNcsKJgNT_RvEHkw5HYDgJV1Ke-P19-u6WnCkqn0=s160-c-k-c0x00ffffff-no-rj" class="main-logo">
                <h1>Itakito_GT <span class="badge">OWNER</span></h1>
                <p style="padding: 0 40px; opacity: 0.8;">DEV de sistemas experto en optimización de Windows e infraestructura de Minecraft.</p>
            </div>
        </div>

        <!-- DESTACADOS -->
        <div id="section-destacados" class="glass-card" style="display:none; padding: 20px;">
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <textarea id="post-text" placeholder="Escribe algo (puedes usar <b>negrita</b> o <img>)..." style="width:100%; background:none; border:none; color:white; outline:none; height:80px;"></textarea>
                <button class="btn-action" style="width: auto; float: right;" onclick="addPost()">Publicar</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feed"></div>
        </div>

        <!-- AJUSTES -->
        <div id="section-settings" class="glass-card" style="display:none; padding: 30px;">
            <center>
                <img id="large-logo" src="" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--accent);">
                <h2 id="settings-title">Ajustes</h2>
            </center>
            <button class="btn-action" style="background:#ff4444;" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        const ADMIN_EMAIL = "jugandoconitakito@gmail.com";
        const prohibitedWords = ["puta", "mierda", "pendejo", "idiota"];

        function initApp() {
            const saved = localStorage.getItem('userSession');
            if (saved) {
                currentUser = JSON.parse(saved);
                applySession();
                showSection('home');
            } else {
                showSection('auth');
            }
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(!email || !pass) return alert("Llena todo, we.");

            // PROTECCIÓN DE ADMIN
            if (email.toLowerCase() === ADMIN_EMAIL) {
                currentUser = { 
                    name: "ItakitoYTblox", 
                    photo: "https://yt3.googleusercontent.com/n2_9nfR7jLbPwRnJkQJ2oyMMQpS-r1wgRpftNcsKJgNT_RvEHkw5HYDgJV1Ke-P19-u6WnCkqn0=s160-c-k-c0x00ffffff-no-rj",
                    role: "ADMINISTRADOR",
                    email: email
                };
            } else {
                currentUser = { 
                    name: email.split('@')[0], 
                    photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    role: "USER",
                    email: email
                };
            }

            localStorage.setItem('userSession', JSON.stringify(currentUser));
            applySession();
            showSection('home');
        }

        function applySession() {
            document.getElementById('user-profile').style.display = 'flex';
            document.getElementById('nav-name').innerHTML = currentUser.name + (currentUser.role === "ADMINISTRADOR" ? ' <span class="badge">ADMIN</span>' : '');
            document.getElementById('nav-avatar').src = currentUser.photo;
            document.getElementById('large-logo').src = currentUser.photo;
        }

        function addPost() {
            let text = document.getElementById('post-text').value;
            if(!text) return;

            // Filtro de toxicidad
            if(prohibitedWords.some(w => text.toLowerCase().includes(w))) {
                return alert("Nada de insultos, we.");
            }

            const post = `
                <div class="feed-item" style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.1);">
                    <strong>${currentUser.name}</strong> ${currentUser.role === "ADMINISTRADOR" ? '<span class="badge">ADMIN</span>' : ''}
                    <div style="margin-top:5px; opacity:0.9;">${text}</div>
                </div>`;
            document.getElementById('feed').innerHTML = post + document.getElementById('feed').innerHTML;
            document.getElementById('post-text').value = "";
        }

        function logout() { localStorage.removeItem('userSession'); location.reload(); }

        function showSection(id) {
            ['home', 'juegos', 'destacados', 'settings', 'auth'].forEach(s => {
                document.getElementById('section-' + s).style.display = (s === id ? 'block' : 'none');
            });
        }
    </script>
</body>
</html>
