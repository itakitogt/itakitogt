<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itakito_GT | Community OS</title>
    <style>
        :root {
            --mac-bg: #1e1e1e;
            --mac-header: #323232;
            --accent: #5865F2;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: url('https://www.10wallpaper.com/wallpaper/1366x768/1508/sardinia_italy-Landscape_wallpaper_1366x768.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; font-family: 'Segoe UI', sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        /* --- LOGIN CORREGIDO (Contraseña arriba, Email abajo) --- */
        #tab-login {
            margin-top: 100px; text-align: center; background: rgba(0,0,0,0.85); 
            padding: 40px; border-radius: 20px; border: 1px solid var(--accent); width: 300px;
            backdrop-filter: blur(10px);
        }
        #tab-login input {
            display: block; width: 100%; margin: 15px 0; padding: 12px; 
            background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;
        }

        /* --- VENTANA MAC --- */
        .mac-window {
            background: var(--mac-bg); width: 90%; max-width: 800px;
            border-radius: 12px; margin-top: 80px; border: 1px solid var(--border);
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .mac-header { background: var(--mac-header); padding: 12px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .mac-content { padding: 25px; max-height: 75vh; overflow-y: auto; }

        /* --- PERFIL CON CAMBIO DE IMAGEN --- */
        .profile-area { text-align: center; padding: 20px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto; cursor: pointer; }
        .pfp-main { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; }
        .pfp-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
            font-size: 12px; font-weight: bold;
        }
        .pfp-container:hover .pfp-overlay { opacity: 1; }

        /* --- EDITOR DE POSTS --- */
        .post-editor { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 25px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .toolbar button { background: #444; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .toolbar button:hover { background: var(--accent); }
        textarea { 
            width: 100%; height: 80px; background: #1a1a1a; border: 1px solid #333; 
            color: white; padding: 12px; border-radius: 8px; resize: none; box-sizing: border-box;
        }

        /* --- POSTS Y COMENTARIOS --- */
        .post { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .post-footer { display: flex; gap: 20px; font-size: 13px; color: #888; margin-top: 10px; }
        .btn-action { cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-action:hover { color: var(--accent); }

        .comment-box { 
            background: #1a1a1a; margin-top: 15px; padding: 15px; border-radius: 8px; 
            display: none; animation: fadeIn 0.3s ease;
        }
        .comment-input-row { display: flex; gap: 10px; }
        .comment-input-row input { flex: 1; background: #333; border: none; color: white; padding: 8px; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="checkLogin()">

    <div id="tab-login">
        <h2 style="margin-bottom: 25px;">Inicia Sesión</h2>
        <input type="password" id="login-pass" placeholder="Contraseña">
        <input type="email" id="login-mail" placeholder="Email">
        <button onclick="login()" style="background:var(--accent); color:white; border:none; width:100%; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">ENTRAR</button>
    </div>

    <div id="main-window" class="mac-window">
        <div class="mac-header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
            <span style="font-size:12px; margin-left:10px; opacity:0.6;">Itakito_GT Terminal v1.0</span>
            <div style="margin-left:auto; display:flex; gap:15px; font-size:12px;">
                <span onclick="showTab('home')" style="cursor:pointer;">INICIO</span>
                <span onclick="showTab('feed')" style="cursor:pointer;">FEED</span>
                <span onclick="showTab('config')" style="cursor:pointer;">PERFIL</span>
            </div>
        </div>

        <div class="mac-content">
            <div id="tab-home" style="display:none;">
                <div id="home-posts"></div>
            </div>

            <div id="tab-feed" style="display:none;">
                <div class="post-editor">
                    <div class="toolbar">
                        <button onclick="wrapText('b')"><b>N</b></button>
                        <button onclick="wrapText('i')"><i>K</i></button>
                        <button onclick="document.getElementById('img-upload').click()">🖼️ Subir</button>
                        <input type="file" id="img-upload" hidden accept="image/*" onchange="handleImage(this, 'post')">
                    </div>
                    <textarea id="post-input" placeholder="¿Qué cuentas, we?"></textarea>
                    <button onclick="createPost()" style="width:100%; margin-top:10px; background:var(--accent); border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;">PUBLICAR</button>
                </div>
                <div id="global-feed"></div>
            </div>

            <div id="tab-config" class="profile-area" style="display:none;">
                <div class="pfp-container" onclick="document.getElementById('pfp-upload').click()">
                    <img id="my-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="pfp-main">
                    <div class="pfp-overlay">CAMBIAR</div>
                </div>
                <input type="file" id="pfp-upload" hidden accept="image/*" onchange="handleImage(this, 'profile')">
                <h2 id="my-name" style="margin-top:15px;"></h2>
                <button onclick="logout()" style="background:#ff4757; border:none; color:white; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:20px;">CERRAR SESIÓN</button>
            </div>
        </div>
    </div>

    <script>
        let user = null;

        function login() {
            const mail = document.getElementById('login-mail').value;
            if(!mail) return alert("Pon tu email, we");
            user = { name: mail.split('@')[0], pfp: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
            localStorage.setItem('ita_session', JSON.stringify(user));
            initUI();
        }

        function checkLogin() {
            const saved = localStorage.getItem('ita_session');
            if(saved) { user = JSON.parse(saved); initUI(); }
        }

        function initUI() {
            document.getElementById('tab-login').style.display = 'none';
            document.getElementById('main-window').style.display = 'flex';
            document.getElementById('my-name').innerText = user.name;
            document.getElementById('my-pfp').src = user.pfp;
            showTab('home');
        }

        function showTab(id) {
            ['home', 'feed', 'config'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
            document.getElementById('tab-'+id).style.display = 'block';
        }

        // --- ARREGLO DE FORMATO (Negrita/Cursiva) ---
        function wrapText(tag) {
            const el = document.getElementById('post-input');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.substring(0, start) + `<${tag}>` + text.substring(start, end) + `</${tag}>` + text.substring(end);
            el.focus();
        }

        // --- MANEJO DE IMÁGENES (Subir desde Galería) ---
        function handleImage(input, type) {
            const reader = new FileReader();
            reader.onload = function(e) {
                if(type === 'profile') {
                    user.pfp = e.target.result;
                    document.getElementById('my-pfp').src = e.target.result;
                    localStorage.setItem('ita_session', JSON.stringify(user));
                } else {
                    document.getElementById('post-input').value += `<img src="${e.target.result}" style="max-width:100%; border-radius:8px; margin-top:10px;">`;
                }
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- SISTEMA DE POSTS Y COMENTARIOS CORREGIDO ---
        function createPost() {
            const content = document.getElementById('post-input').value;
            if(!content) return;
            const id = Date.now();
            const html = `
                <div class="post">
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                        <img src="${user.pfp}" style="width:30px; height:30px; border-radius:50%;">
                        <strong>${user.name}</strong>
                    </div>
                    <div>${content}</div>
                    <div class="post-footer">
                        <div class="btn-action" onclick="toggleComments(${id})">💬 <span id="count-${id}">0</span> Comentarios</div>
                    </div>
                    <div class="comment-box" id="box-${id}">
                        <div id="list-${id}" style="margin-bottom:10px; font-size:13px;"></div>
                        <div class="comment-input-row">
                            <input type="text" id="in-${id}" placeholder="Escribe un comentario...">
                            <button onclick="addComment(${id})" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;">Comentar</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('global-feed').insertAdjacentHTML('afterbegin', html);
            document.getElementById('home-posts').insertAdjacentHTML('afterbegin', html);
            document.getElementById('post-input').value = "";
        }

        function toggleComments(id) {
            const box = document.getElementById('box-'+id);
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function addComment(id) {
            const input = document.getElementById('in-'+id);
            const list = document.getElementById('list-'+id);
            const count = document.getElementById('count-'+id);
            if(!input.value) return;
            list.innerHTML += `<div style="margin-top:5px;"><strong>${user.name}:</strong> ${input.value}</div>`;
            count.innerText = parseInt(count.innerText) + 1;
            input.value = "";
        }

        function logout() { localStorage.removeItem('ita_session'); location.reload(); }
    </script>
</body>
</html>
